<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Pixel Perfect Web</title>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter text-blue-600">PIXEL<span class="text-slate-900">PERFECT</span></div>
        <div class="hidden md:flex space-x-8 font-medium text-slate-600">
            <a href="#" class="hover:text-blue-600 transition">Home</a>
            <a href="#" class="hover:text-blue-600 transition">Services</a>
            <a href="#" class="hover:text-blue-600 transition">Portfolio</a>
            <a href="#" class="hover:text-blue-600 transition">Contact</a>
        </div>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
            Get Started
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-20 flex flex-col md:flex-row items-center">
        <div class="md:w-1/2 space-y-6">
            <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold uppercase tracking-wide">
                Digital Agency
            </span>
            <h1 class="text-5xl md:text-7xl font-extrabold leading-tight">
                Crafting <span class="text-blue-600">Pixel Perfect</span> Digital Experiences.
            </h1>
            <p class="text-lg text-slate-600 max-w-lg">
                We design and build high-quality websites that combine stunning visuals with seamless functionality. Elevate your brand today.
            </p>
            <div class="flex space-x-4 pt-4">
                <button class="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-800 transition">
                    Start a Project
                </button>
                <button class="border-2 border-slate-200 px-8 py-4 rounded-xl font-bold hover:bg-slate-100 transition">
                    View Work
                </button>
            </div>
        </div>

        <div class="md:w-1/2 mt-12 md:mt-0 relative px-4">
            <div class="w-full h-96 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-3xl shadow-2xl transform rotate-3 flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                <h2 class="text-white text-3xl font-bold -rotate-3">Your Vision Here</h2>
            </div>
            <div class="absolute -bottom-6 -left-4 bg-white p-6 rounded-2xl shadow-xl border border-slate-100 hidden sm:block">
                <p class="text-sm font-bold text-slate-400 uppercase">Success Rate</p>
                <p class="text-3xl font-black text-slate-900">99.9%</p>
            </div>
        </div>
    </main>

</body>
</html>
